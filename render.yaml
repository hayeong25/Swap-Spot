services:
  - type: web
    name: swap-spot
    runtime: python
    plan: free
    buildCommand: pip install -e ".[postgres]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swap-spot-db
          property: connectionString
      - key: KOREAEXIM_API_KEY
        sync: false
      - key: ECOS_API_KEY
        sync: false
      - key: ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
databases:
  - name: swap-spot-db
    plan: free
    databaseName: swap_spot
