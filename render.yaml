services:
  - type: web
    name: swap-spot
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KOREAEXIM_API_KEY
        sync: false
      - key: ECOS_API_KEY
        sync: false
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
